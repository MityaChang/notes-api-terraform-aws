stages:
  - validate
  - build
  - plan
  - deploy

variables:
  TF_DIR: terraform/environments/dev
  APP_DIR: app
  TF_IN_AUTOMATION: "true"
  AWS_DEFAULT_REGION: ap-southeast-1
  TF_VAR_provider_arn: $PROVIDER

# OIDC role assumption for AWS - requires CI variable ROLE_ARN
.aws_oidc:
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.com
  before_script:
    - >
      export $(printf "AWS_ACCESS_KEY_ID=%s AWS_SECRET_ACCESS_KEY=%s AWS_SESSION_TOKEN=%s"
      $(aws sts assume-role-with-web-identity
      --role-arn $ROLE_ARN
      --role-session-name "gitlab-ci-${CI_PROJECT_ID}-${CI_PIPELINE_ID}"
      --web-identity-token $GITLAB_OIDC_TOKEN
      --duration-seconds 3600
      --query "Credentials.[AccessKeyId,SecretAccessKey,SessionToken]"
      --output text))

# --- Validate Stage ---

terraform-fmt:
  stage: validate
  image: hashicorp/terraform:1.5
  script:
    - cd $TF_DIR
    - terraform fmt -check -recursive ../..

terraform-validate:
  stage: validate
  image: hashicorp/terraform:1.5
  script:
    - cd $TF_DIR
    - terraform init -backend=false
    - terraform validate

python-lint:
  stage: validate
  image: python:3.11-slim
  script:
    - pip install ruff
    - cd $APP_DIR
    - ruff check .

# --- Build Stage ---

build-image:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  extends: .aws_oidc
  script:
    - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_REPO_URL
    - cd $APP_DIR
    - docker build -t $ECR_REPO_URL:$CI_COMMIT_SHORT_SHA .
    - docker push $ECR_REPO_URL:$CI_COMMIT_SHORT_SHA
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# --- Plan Stage ---

terraform-plan:
  stage: plan
  image: hashicorp/terraform:1.5
  extends: .aws_oidc
  script:
    - cd $TF_DIR
    - terraform init
    - terraform plan -var="app_image_tag=$CI_COMMIT_SHORT_SHA" -out=tfplan
  artifacts:
    paths:
      - $TF_DIR/tfplan
    expire_in: 7 days
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# --- Deploy Stage ---

terraform-apply:
  stage: deploy
  image: hashicorp/terraform:1.5
  extends: .aws_oidc
  script:
    - cd $TF_DIR
    - terraform init
    - terraform apply tfplan
  dependencies:
    - terraform-plan
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
